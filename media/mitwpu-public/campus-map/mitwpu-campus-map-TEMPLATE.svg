<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200" font-family="Helvetica, Arial, sans-serif">
<!--
  MIT-WPU KOTHRUD CAMPUS MAP — EDITABLE TEMPLATE
  ================================================
  HOW TO USE (edit this file in any text/SVG editor, e.g. Figma/Inkscape/VS Code):
  1) Open Google Maps satellite for the campus. The campus is a north–south strip on the
     WEST flank of Vetal Tekdi hill (green, right/east). North is UP.
  2) For each real building: copy one <g class="bldg">…</g> block below, move it to the
     right position (change the transform translate x,y), resize the <rect> to the real
     FOOTPRINT SHAPE, and set the <text> label. For an angled/L-shaped building, replace
     the <rect> with a <polygon points="…"/> traced from the satellite footprint.
  3) To drop a building PHOTO: put the image file in this folder and set it as the block's
     background via <image href="my-photo.jpg" x=… y=… width=… height=…/> (add before the rect).
  4) Gates, roads (Paud/MIT Rd, Vishwashanti Marg), the Vetal Tekdi ridge, north arrow,
     legend, and title are pre-placed — nudge as needed.
  Palette: brand blue #173a55, gold #b8860b, hill green #cfe0c4.
  Grid lines below are 100px guides — DELETE the <g id="grid"> before publishing.
-->
  <rect width="1000" height="1200" fill="#f7f5ef"/>

  <!-- 100px reference grid (DELETE before publishing) -->
  <g id="grid" stroke="#e6e2d8" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="1200"/><line x1="200" y1="0" x2="200" y2="1200"/>
    <line x1="300" y1="0" x2="300" y2="1200"/><line x1="400" y1="0" x2="400" y2="1200"/>
    <line x1="500" y1="0" x2="500" y2="1200"/><line x1="600" y1="0" x2="600" y2="1200"/>
    <line x1="700" y1="0" x2="700" y2="1200"/><line x1="800" y1="0" x2="800" y2="1200"/>
    <line x1="0" y1="100" x2="1000" y2="100"/><line x1="0" y1="300" x2="1000" y2="300"/>
    <line x1="0" y1="500" x2="1000" y2="500"/><line x1="0" y1="700" x2="1000" y2="700"/>
    <line x1="0" y1="900" x2="1000" y2="900"/><line x1="0" y1="1100" x2="1000" y2="1100"/>
  </g>

  <!-- Vetal Tekdi hill (EAST) — retrace this contour from satellite -->
  <path d="M 830 0 C 900 250, 920 550, 880 820 C 855 980, 910 1080, 970 1200 L 1000 1200 L 1000 0 Z"
        fill="#cfe0c4"/>
  <text x="915" y="600" fill="#5f7a4f" font-size="13" font-weight="700"
        transform="rotate(90 915 600)" text-anchor="middle">VETAL TEKDI · wooded hill</text>

  <!-- Roads (retrace) -->
  <path d="M 60 1100 L 700 1100" stroke="#c4cbd3" stroke-width="14" fill="none" stroke-linecap="round"/>
  <text x="380" y="1125" fill="#8a97a4" font-size="12" font-style="italic" text-anchor="middle">Paud Road / MIT Road (Main Gate)</text>
  <path d="M 250 250 L 780 250" stroke="#c4cbd3" stroke-width="12" fill="none" stroke-linecap="round"/>
  <text x="480" y="238" fill="#8a97a4" font-size="12" font-style="italic" text-anchor="middle">Vishwashanti Marg (Back Gate)</text>

  <!-- GATE markers -->
  <g><rect x="374" y="1082" width="10" height="30" fill="#b8860b"/><rect x="416" y="1082" width="10" height="30" fill="#b8860b"/>
     <text x="440" y="1098" fill="#8a6400" font-size="13" font-weight="700">MAIN GATE</text></g>
  <g><rect x="380" y="238" width="9" height="24" fill="#b8860b"/>
     <text x="300" y="252" fill="#8a6400" font-size="13" font-weight="700" text-anchor="end">BACK GATE ›</text></g>

  <!-- ===== BUILDING BLOCK — copy/move/resize/rename one per real building ===== -->
  <g class="bldg" transform="translate(300,320)">
    <!-- <image href="mit-coe-photo.jpg" x="0" y="0" width="150" height="120"/> optional photo -->
    <rect width="150" height="120" rx="6" fill="#e9edf1" stroke="#8898a6" stroke-width="1.5"/>
    <text x="12" y="34" fill="#173a55" font-size="14" font-weight="700">MIT College</text>
    <text x="12" y="52" fill="#173a55" font-size="14" font-weight="700">of Engineering</text>
    <text x="12" y="70" fill="#5b6b7a" font-size="10">academic core · REPLACE</text>
  </g>

  <!-- Example second block (rename/reposition). Use <polygon> for non-rectangular footprints. -->
  <g class="bldg" transform="translate(560,340)">
    <rect width="120" height="90" rx="6" fill="#e9edf1" stroke="#8898a6" stroke-width="1.5"/>
    <text x="12" y="30" fill="#173a55" font-size="13" font-weight="700">Maitreyi</text>
    <text x="12" y="46" fill="#5b6b7a" font-size="10">Central Research Facility</text>
  </g>

  <!-- Peace / landmark block (gold) -->
  <g class="bldg" transform="translate(300,560)">
    <rect width="150" height="120" rx="6" fill="#f0dd9a" stroke="#b8860b" stroke-width="2"/>
    <text x="12" y="34" fill="#8a6400" font-size="13" font-weight="800">DOME / LANDMARK</text>
    <text x="12" y="52" fill="#5b6b7a" font-size="10">REPLACE with real footprint</text>
  </g>

  <!-- Residential block (mauve) -->
  <g class="bldg" transform="translate(560,760)">
    <rect width="110" height="110" rx="6" fill="#ece3f0" stroke="#b09bbd" stroke-width="1.5"/>
    <text x="12" y="30" fill="#173a55" font-size="13" font-weight="700">Hostel</text>
  </g>

  <!-- Sports block (green) -->
  <g class="bldg" transform="translate(560,930)">
    <rect width="150" height="110" rx="55" fill="#cfe6c0" stroke="#8fb37c" stroke-width="2"/>
    <text x="75" y="60" fill="#4f7a3f" font-size="12" font-weight="700" text-anchor="middle">Sports Ground</text>
  </g>

  <!-- Title -->
  <rect x="40" y="36" width="8" height="34" fill="#b8860b"/>
  <text x="60" y="58" fill="#173a55" font-size="22" font-weight="800">MIT-WPU Kothrud — Campus Map</text>
  <text x="60" y="78" fill="#5b6b7a" font-size="12">Editable template · trace real footprints from Google Maps · north up</text>

  <!-- North arrow -->
  <g transform="translate(930,100)"><circle r="22" fill="#fff" stroke="#173a55" stroke-width="1.5"/>
    <path d="M 0 -15 L 7 7 L 0 1 L -7 7 Z" fill="#173a55"/><text y="20" text-anchor="middle" fill="#173a55" font-size="11" font-weight="700">N</text></g>

  <!-- Legend -->
  <g transform="translate(60,1150)">
    <rect x="0" y="0" width="16" height="12" fill="#e9edf1" stroke="#8898a6"/><text x="22" y="10" fill="#5b6b7a" font-size="11">academic</text>
    <rect x="110" y="0" width="16" height="12" fill="#f0dd9a" stroke="#b8860b"/><text x="132" y="10" fill="#5b6b7a" font-size="11">landmark</text>
    <rect x="210" y="0" width="16" height="12" fill="#ece3f0" stroke="#b09bbd"/><text x="232" y="10" fill="#5b6b7a" font-size="11">residential</text>
    <rect x="330" y="0" width="16" height="12" fill="#cfe6c0" stroke="#8fb37c"/><text x="352" y="10" fill="#5b6b7a" font-size="11">sports</text>
  </g>
</svg>
